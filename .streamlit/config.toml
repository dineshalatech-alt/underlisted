# Streamlit theme — clean-green. Makes primary buttons/accents green and trims
# the developer toolbar for a polished, app-like look.

[theme]
primaryColor = "#1D9E75"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#EAF6F1"
textColor = "#1F2933"

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
