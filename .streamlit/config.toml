# Streamlit theme — "Warm & trustworthy". Cream base, warm coral accent,
# near-black text. Trims the developer toolbar for a polished, app-like look.

[theme]
primaryColor = "#FF6B5C"
backgroundColor = "#FFFDF8"
secondaryBackgroundColor = "#FBEFE8"
textColor = "#1A1A1A"

[client]
toolbarMode = "minimal"

[server]
# Serve files from app/static/ (e.g. the hero video) at /app/static/<file>.
enableStaticServing = true

[browser]
gatherUsageStats = false
