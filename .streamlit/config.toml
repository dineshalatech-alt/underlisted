# Streamlit theme — "Dark luxe". Black base, gold accent, DM Sans, off-white text.
# Trims the developer toolbar for a polished, app-like look.

[theme]
base = "dark"
primaryColor = "#E8B948"
backgroundColor = "#000000"
secondaryBackgroundColor = "#141210"
textColor = "#F5F5F7"
font = "sans serif"

[client]
toolbarMode = "minimal"

[server]
# Serve files from app/static/ (e.g. the hero video) at /app/static/<file>.
enableStaticServing = true

[browser]
gatherUsageStats = false
